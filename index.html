<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充放電サイクル特徴点抽出ツール (v2)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
           "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
         margin: 0; padding: 0; background: #f5f7fa; color: #2c3e50; }
  header { background: linear-gradient(135deg,#667eea,#764ba2); color: white;
           padding: 24px 32px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  header h1 { margin: 0; font-size: 1.5em; }
  header p { margin: 6px 0 0; opacity: .9; font-size: .9em; }
  main { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
  .card { background: white; border-radius: 12px; padding: 24px;
          margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .card h2 { margin-top: 0; color: #34495e; font-size: 1.15em;
             border-left: 4px solid #667eea; padding-left: 10px; }
  .drop-zone { border: 2px dashed #b0bec5; border-radius: 10px;
               padding: 40px; text-align: center; cursor: pointer;
               transition: all .2s; }
  .drop-zone:hover, .drop-zone.dragover { background: #eef2ff;
                                           border-color: #667eea; }
  .drop-zone .icon { font-size: 3em; color: #90a4ae; }
  .drop-zone .label { margin-top: 8px; color: #546e7a; }
  input[type=file] { display: none; }
  .params { display: grid;
            grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
            gap: 14px; margin-top: 12px; }
  .params label { display: flex; flex-direction: column; gap: 4px;
                  font-size: .9em; color: #546e7a; }
  .params input { padding: 8px 10px; border: 1px solid #cfd8dc;
                  border-radius: 6px; font-size: 1em; }
  .btn { background: linear-gradient(135deg,#667eea,#764ba2); color: white;
         border: none; padding: 10px 22px; border-radius: 6px;
         cursor: pointer; font-size: .95em; font-weight: 600;
         margin-right: 8px; margin-top: 8px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.secondary { background: #607d8b; }
  .btn.success { background: linear-gradient(135deg,#43a047,#2e7d32); }
  table { width: 100%; border-collapse: collapse; margin-top: 12px;
          font-size: .85em; }
  th, td { padding: 5px 8px; border: 1px solid #e0e0e0; text-align: right;
           white-space: nowrap; }
  th { background: #eceff1; color: #37474f; font-weight: 600;
       position: sticky; top: 0; }
  td:first-child, th:first-child { text-align: center; }
  tr:nth-child(even) td { background: #fafbfc; }
  .summary { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
  .stat { background: #eef2ff; padding: 10px 18px; border-radius: 8px;
          min-width: 140px; }
  .stat .v { font-size: 1.6em; font-weight: 700; color: #667eea; }
  .stat .l { font-size: .82em; color: #546e7a; }
  #log { max-height: 140px; overflow-y: auto; font-family: monospace;
         font-size: .85em; background: #263238; color: #aed581;
         padding: 12px; border-radius: 6px; white-space: pre-wrap; }
  .legend-dot { display: inline-block; width: 10px; height: 10px;
                border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .hide { display: none; }
  footer { text-align: center; color: #90a4ae; font-size: .82em;
           padding: 24px 0; }
</style>
</head>
<body>

<header>
  <h1>🔋 充放電サイクル特徴点抽出ツール</h1>
  <p>T&D Graph CSV から 青(放電終了Ch1最低値) / 赤(充電終了ピーク) / 黄 / 緑 を自動抽出</p>
</header>

<main>

  <div class="card">
    <h2>① CSVファイルを選択</h2>
    <label for="file" class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <div class="label"><b>クリック</b>または<b>ドラッグ＆ドロップ</b></div>
      <div class="label" id="fileName" style="color:#667eea;font-weight:600;"></div>
    </label>
    <input type="file" id="file" accept=".csv,text/csv,text/plain">
  </div>

  <div class="card">
    <h2>② パラメータ</h2>
    <div class="params">
      <label>Ch2 状態判定閾値 [V]
        <input type="number" id="thr" value="0.1" step="0.01">
      </label>
      <label>下げ止まり経過秒 [s]
        <input type="number" id="settle" value="30" step="5">
      </label>
      <label>ヘッダスキップ行数
        <input type="number" id="skip" value="3" step="1">
      </label>
    </div>
    <button class="btn" id="runBtn" disabled>▶ 解析実行</button>
  </div>

  <div class="card hide" id="logCard">
    <h2>処理ログ</h2>
    <div id="log"></div>
  </div>

  <div class="card hide" id="resultCard">
    <h2>③ 抽出結果</h2>
    <div class="summary" id="summary"></div>
    <div style="margin-top:14px;">
      <span class="legend-dot" style="background:#2962ff"></span>B列 青 = 放電終了Ch1(底)
      <span class="legend-dot" style="background:#d32f2f;margin-left:10px;"></span>C列 赤 = 充電終了Ch1
      <span class="legend-dot" style="background:#f9a825;margin-left:10px;"></span>D列 黄 = 放電直前Ch1
      <span class="legend-dot" style="background:#2e7d32;margin-left:10px;"></span>E/F 緑 = 下げ止まりCh1/Ch2
    </div>
    <button class="btn success" id="dlXlsx">⬇ Excel (.xlsx)</button>
    <button class="btn success" id="dlCsv">⬇ CSV</button>
    <div style="max-height:380px;overflow:auto;margin-top:12px;">
      <table id="resultTable"></table>
    </div>
  </div>

  <div class="card hide" id="chartCard">
    <h2>④ 検証グラフ</h2>
    <canvas id="chart1" height="120"></canvas>
    <canvas id="chart2" height="60" style="margin-top:8px;"></canvas>
  </div>

</main>

<footer>Battery Cycle Extractor v2 / ブラウザ内で完結・データはサーバー送信されません</footer>

<script>
// =======================================================================
// コアロジック
// =======================================================================
function classifyState(ch2, thr) {
  if (ch2 >  thr) return 'C';
  if (ch2 < -thr) return 'D';
  return 'I';
}

function parseCsv(text, skipRows) {
  const lines = text.split(/\r?\n/);
  const rows = [];
  for (let i = skipRows; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cells = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    if (cells.length < 4) continue;
    const dt = new Date(cells[0].replace(' ', 'T'));
    const ch1 = parseFloat(cells[2]);
    const ch2 = parseFloat(cells[3]);
    if (isNaN(dt.getTime()) || isNaN(ch1) || isNaN(ch2)) continue;
    rows.push({ datetime: dt, ch1, ch2 });
  }
  return rows;
}

function extractCycles(rows, thr, settleSec) {
  rows.forEach(r => r.state = classifyState(r.ch2, thr));
  const events = [];
  for (let i = 0; i < rows.length; i++) {
    const prev = i > 0 ? rows[i-1].state : null;
    if (rows[i].state !== prev) {
      events.push({ idx: i, from: prev, to: rows[i].state, time: rows[i].datetime });
    }
  }

  const cycles = [];
  for (let k = 0; k < events.length; k++) {
    const ev = events[k];
    if (ev.from !== 'I' || ev.to !== 'C') continue;
    const chargeStartIdx = ev.idx;

    // 青 = 直前の D→I 遷移の1つ前 (放電期間の最後 = Ch1最低)
    let blueIdx = null;
    for (let j = k - 1; j >= 0; j--) {
      if (events[j].from === 'D' && events[j].to === 'I') {
        blueIdx = Math.max(events[j].idx - 1, 0); break;
      }
    }
    if (blueIdx === null) {
      blueIdx = Math.max(chargeStartIdx - 1, 0);  // 初回サイクル用フォールバック
    }

    // 赤 = 次の C→I の1つ前
    let redIdx = null, redEv = null;
    for (let j = k + 1; j < events.length; j++) {
      if (events[j].from === 'C' && events[j].to === 'I') {
        redIdx = Math.max(events[j].idx - 1, 0); redEv = events[j]; break;
      }
    }
    if (redIdx === null) continue;

    // 黄 = 次の I→D の1つ前
    let yellowIdx = null, yellowEv = null;
    for (let j = k + 1; j < events.length; j++) {
      if (events[j].from === 'I' && events[j].to === 'D'
          && events[j].idx > redEv.idx) {
        yellowIdx = Math.max(events[j].idx - 1, 0); yellowEv = events[j]; break;
      }
    }
    if (yellowIdx === null) continue;

    // 緑 = I→D + settleSec 秒後
    const tSettle = new Date(yellowEv.time.getTime() + settleSec * 1000);
    let greenIdx = null;
    for (let j = yellowEv.idx; j < rows.length; j++) {
      if (rows[j].datetime >= tSettle && rows[j].state === 'D') {
        greenIdx = j; break;
      }
    }
    if (greenIdx === null) continue;

    cycles.push({
      cycle:       cycles.length + 1,
      blue_time:   rows[blueIdx].datetime,
      blue_ch1:    rows[blueIdx].ch1,
      red_time:    rows[redIdx].datetime,
      red_ch1:     rows[redIdx].ch1,
      yellow_time: rows[yellowIdx].datetime,
      yellow_ch1:  rows[yellowIdx].ch1,
      green_time:  rows[greenIdx].datetime,
      green_ch1:   rows[greenIdx].ch1,
      green_ch2:   rows[greenIdx].ch2,
    });
  }
  return cycles;
}

// =======================================================================
// UI
// =======================================================================
const $ = id => document.getElementById(id);
let currentFile = null, currentRows = null, currentCycles = null;
let chart1 = null, chart2 = null;

function log(msg) {
  $('logCard').classList.remove('hide');
  $('log').textContent += msg + '\n';
  $('log').scrollTop = $('log').scrollHeight;
}

$('file').addEventListener('change', e => {
  if (e.target.files.length) setFile(e.target.files[0]);
});
$('dropZone').addEventListener('dragover', e => {
  e.preventDefault(); $('dropZone').classList.add('dragover');
});
$('dropZone').addEventListener('dragleave', () => $('dropZone').classList.remove('dragover'));
$('dropZone').addEventListener('drop', e => {
  e.preventDefault(); $('dropZone').classList.remove('dragover');
  if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  currentFile = f;
  $('fileName').textContent = `選択中: ${f.name} (${(f.size/1024/1024).toFixed(2)} MB)`;
  $('runBtn').disabled = false;
}

$('runBtn').addEventListener('click', async () => {
  if (!currentFile) return;
  $('log').textContent = '';
  log(`読込中: ${currentFile.name}`);
  const t0 = performance.now();
  const text = await currentFile.text();
  const skip = parseInt($('skip').value, 10);
  const rows = parseCsv(text, skip);
  log(`${rows.length.toLocaleString()} 行を解析`);
  if (rows.length === 0) { log('有効なデータが見つかりません'); return; }

  const thr = parseFloat($('thr').value);
  const settle = parseInt($('settle').value, 10);
  const cycles = extractCycles(rows, thr, settle);
  log(`検出サイクル数: ${cycles.length}`);
  log(`処理時間: ${((performance.now()-t0)/1000).toFixed(2)} 秒`);

  currentRows = rows; currentCycles = cycles;
  renderResult();
});

function renderResult() {
  const n = currentCycles.length;
  const avg = k => n ? currentCycles.reduce((s,c)=>s+c[k],0)/n : 0;

  $('summary').innerHTML = `
    <div class="stat"><div class="v">${n}</div><div class="l">検出サイクル数</div></div>
    <div class="stat"><div class="v">${avg('blue_ch1').toFixed(3)}V</div><div class="l">平均 青 放電終了</div></div>
    <div class="stat"><div class="v">${avg('red_ch1').toFixed(3)}V</div><div class="l">平均 赤 充電終了</div></div>
    <div class="stat"><div class="v">${avg('yellow_ch1').toFixed(3)}V</div><div class="l">平均 黄 放電直前</div></div>
    <div class="stat"><div class="v">${avg('green_ch1').toFixed(3)}V</div><div class="l">平均 緑 下げ止まり</div></div>`;

  let html = '<thead><tr>' +
    '<th>A:#</th>' +
    '<th>B:青Ch1</th><th>C:赤Ch1</th><th>D:黄Ch1</th><th>E:緑Ch1</th><th>F:緑Ch2</th>' +
    '<th>G:青時刻(放電終了)</th><th>H:赤時刻(充電終了)</th><th>I:黄時刻</th><th>J:緑時刻</th>' +
    '</tr></thead><tbody>';
  currentCycles.forEach(c => {
    html += `<tr>
      <td>${c.cycle}</td>
      <td>${c.blue_ch1.toFixed(5)}</td>
      <td>${c.red_ch1.toFixed(5)}</td>
      <td>${c.yellow_ch1.toFixed(5)}</td>
      <td>${c.green_ch1.toFixed(5)}</td>
      <td>${c.green_ch2.toFixed(5)}</td>
      <td>${fmtDate(c.blue_time)}</td>
      <td>${fmtDate(c.red_time)}</td>
      <td>${fmtDate(c.yellow_time)}</td>
      <td>${fmtDate(c.green_time)}</td></tr>`;
  });
  html += '</tbody>';
  $('resultTable').innerHTML = html;

  $('resultCard').classList.remove('hide');
  $('chartCard').classList.remove('hide');
  renderChart();
}

function fmtDate(d){
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} `
       + `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function renderChart() {
  const step = Math.max(1, Math.floor(currentRows.length / 3000));
  const sparse = currentRows.filter((_,i)=> i % step === 0);
  const ch1Data = sparse.map(r => ({x: r.datetime, y: r.ch1}));
  const ch2Data = sparse.map(r => ({x: r.datetime, y: r.ch2}));

  const makeMark = (getx, gety, color) => ({
    type: 'scatter',
    data: currentCycles.map(c => ({x: c[getx], y: c[gety]})),
    backgroundColor: 'transparent', borderColor: color, borderWidth: 2,
    pointRadius: 7, pointStyle: 'circle', showLine: false,
  });

  if (chart1) chart1.destroy();
  chart1 = new Chart($('chart1'), {
    type: 'line',
    data: { datasets: [
      { label: 'Ch1', data: ch1Data, borderColor: '#e53935',
        borderWidth: 1, pointRadius: 0, tension: 0 },
      { label: '青 放電終了', ...makeMark('blue_time','blue_ch1','#2962ff') },
      { label: '赤 充電終了', ...makeMark('red_time','red_ch1','#d32f2f') },
      { label: '黄 放電直前', ...makeMark('yellow_time','yellow_ch1','#f9a825') },
      { label: '緑 下げ止まり',...makeMark('green_time','green_ch1','#2e7d32') },
    ]},
    options: {
      responsive: true, animation: false, parsing: false,
      scales: {
        x: { type: 'time', time: { tooltipFormat: 'yyyy-MM-dd HH:mm' } },
        y: { title: { display: true, text: 'Ch1 (V)' } } },
      plugins: { legend: { position: 'bottom' } }
    }
  });

  if (chart2) chart2.destroy();
  chart2 = new Chart($('chart2'), {
    type: 'line',
    data: { datasets: [
      { label: 'Ch2', data: ch2Data, borderColor: '#b8a000',
        borderWidth: 1, pointRadius: 0, tension: 0 },
      { label: '緑 Ch2', ...makeMark('green_time','green_ch2','#2e7d32') },
    ]},
    options: {
      responsive: true, animation: false, parsing: false,
      scales: { x: { type: 'time' },
                y: { title: { display: true, text: 'Ch2 (V)' } } },
      plugins: { legend: { position: 'bottom' } }
    }
  });
}

// =======================================================================
// ダウンロード
// =======================================================================
function buildSheetData() {
  const header = [
    'A_サイクル番号',
    'B_青_放電終了_Ch1(V)',
    'C_赤_充電終了_Ch1(V)',
    'D_黄_放電開始直前_Ch1(V)',
    'E_緑_放電下げ止まり_Ch1(V)',
    'F_緑_放電下げ止まり_Ch2(V)',
    'G_青_時刻(放電終了)',
    'H_赤_時刻(充電終了)',
    'I_黄_時刻',
    'J_緑_時刻'
  ];
  const rows = currentCycles.map(c => [
    c.cycle,
    c.blue_ch1, c.red_ch1, c.yellow_ch1, c.green_ch1, c.green_ch2,
    fmtDate(c.blue_time), fmtDate(c.red_time),
    fmtDate(c.yellow_time), fmtDate(c.green_time)
  ]);
  return [header, ...rows];
}

$('dlXlsx').addEventListener('click', () => {
  const data = buildSheetData();
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, 'Cycles');
  const base = currentFile.name.replace(/\.[^.]+$/,'');
  XLSX.writeFile(wb, `${base}_cycles.xlsx`);
});

$('dlCsv').addEventListener('click', () => {
  const data = buildSheetData();
  const csv = data.map(r => r.join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const base = currentFile.name.replace(/\.[^.]+$/,'');
  a.download = `${base}_cycles.csv`;
  a.click();
});
</script>
</body>
</html>
